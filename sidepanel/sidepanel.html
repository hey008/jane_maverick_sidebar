<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sidebar Browser</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>

  <!-- ── Toolbar ────────────────────────────────────── -->
  <header class="toolbar" role="toolbar">
    <div class="btn-group">
      <button id="btn-back" class="icon-btn" title="Back" aria-label="Back" disabled>
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
      </button>
      <button id="btn-forward" class="icon-btn" title="Forward" aria-label="Forward" disabled>
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8z"/></svg>
      </button>
      <button id="btn-refresh" class="icon-btn" title="Reload" aria-label="Reload">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M17.65 6.35A7.958 7.958 0 0 0 12 4C7.58 4 4 7.58 4 12s3.58 8 8 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0 1 12 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
      </button>
    </div>

    <div class="url-wrap">
      <input
        id="url-input"
        type="text"
        class="url-input"
        placeholder="Enter URL or search…"
        autocomplete="off"
        spellcheck="false"
        aria-label="Address bar"
      >
    </div>

    <div class="btn-group">
      <!-- Mobile view toggle -->
      <button id="btn-mobile" class="icon-btn toggle-btn" title="Toggle mobile view" aria-label="Toggle mobile view" aria-pressed="false">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M17 1.01L7 1c-1.1 0-2 .9-2 2v18c0 1.1.9 2 2 2h10c1.1 0 2-.9 2-2V3c0-1.1-.9-1.99-2-1.99zM17 19H7V5h10v14z"/></svg>
      </button>
      <!-- Pin sidebar -->
      <button id="btn-pin" class="icon-btn toggle-btn" title="Pin sidebar (auto-open on all tabs)" aria-label="Pin sidebar" aria-pressed="false">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M16 12V4h1V2H7v2h1v8l-2 2v2h5.2v6h1.6v-6H18v-2l-2-2z"/></svg>
      </button>
      <!-- Open current page in new tab -->
      <button id="btn-new-tab" class="icon-btn" title="Open in new tab" aria-label="Open in new tab">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M19 19H5V5h7V3H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2v-7h-2v7zM14 3v2h3.59l-9.83 9.83 1.41 1.41L19 6.41V10h2V3h-7z"/></svg>
      </button>
    </div>
  </header>

  <!-- ── Mobile view label ───────────────────────────── -->
  <div class="mobile-badge" id="mobile-badge" aria-live="polite">
    <svg viewBox="0 0 24 24"><path d="M17 1.01L7 1c-1.1 0-2 .9-2 2v18c0 1.1.9 2 2 2h10c1.1 0 2-.9 2-2V3c0-1.1-.9-1.99-2-1.99zM17 19H7V5h10v14z"/></svg>
    Mobile view — 390 × 844 px (iPhone 14 Pro)
  </div>

  <!-- ── Browser frame + right sites bar ───────────────── -->
  <main class="browser-area">
    <!-- iframes are created dynamically in sidepanel.js (one per slot) -->
    <div class="frame-shell" id="frame-shell"></div>

    <!-- Quick-sites icon bar — right column -->
    <nav class="sites-bar" id="sites-bar" aria-label="Pinned sites">
      <div class="sites-list" id="sites-list">
        <span class="sites-empty" id="sites-empty" title="Right-click any page → Add to Sidebar"></span>
      </div>
      <button class="icon-btn sites-add-btn" id="btn-add-site" title="Add current page to sidebar" aria-label="Add current page">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
      </button>
    </nav>
  </main>

  <script src="sidepanel.js"></script>
</body>
</html>
