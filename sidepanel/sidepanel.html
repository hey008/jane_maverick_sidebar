<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jane Maverick's Sidebar</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>

  <!-- ── Toolbar ────────────────────────────────────── -->
  <header class="toolbar" role="toolbar">
    <div class="btn-group nav-btns">
      <button id="btn-back" class="icon-btn" title="Back" aria-label="Back" disabled>
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
      </button>
      <button id="btn-forward" class="icon-btn" title="Forward" aria-label="Forward" disabled>
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8z"/></svg>
      </button>
      <button id="btn-refresh" class="icon-btn" title="Reload" aria-label="Reload">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M17.65 6.35A7.958 7.958 0 0 0 12 4C7.58 4 4 7.58 4 12s3.58 8 8 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0 1 12 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
      </button>
    </div>

    <div class="url-wrap">
      <input
        id="url-input"
        type="text"
        class="url-input"
        placeholder="Enter URL or search…"
        autocomplete="off"
        spellcheck="false"
        aria-label="Address bar"
      >
    </div>

    <div class="btn-group">
      <button id="btn-new-tab" class="icon-btn" title="Open in new tab" aria-label="Open in new tab">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M19 19H5V5h7V3H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2v-7h-2v7zM14 3v2h3.59l-9.83 9.83 1.41 1.41L19 6.41V10h2V3h-7z"/></svg>
      </button>
      <button id="btn-settings" class="icon-btn" title="Manage sites" aria-label="Manage sites">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.07-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.74,8.87C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.07,0.94l-2.03,1.58c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.44-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.47-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/></svg>
      </button>
    </div>
  </header>

  <!-- ── Browser frame + right sites bar ───────────────── -->
  <main class="browser-area">
    <div class="frame-shell" id="frame-shell"></div>

    <nav class="sites-bar" id="sites-bar" aria-label="Pinned sites">
      <div class="sites-list" id="sites-list">
        <span class="sites-empty" id="sites-empty" title="Right-click any page → Add to Sidebar"></span>
      </div>
      <button class="icon-btn sites-add-btn" id="btn-add-site" title="Add current page to sidebar" aria-label="Add current page">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
      </button>
    </nav>

    <!-- Site management panel (overlays the browser area) -->
    <div class="manage-panel" id="manage-panel" hidden>
      <div class="manage-header">
        <span class="manage-title">Manage Sites</span>
        <button class="icon-btn" id="btn-manage-close" title="Close" aria-label="Close manage panel">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
        </button>
      </div>
      <div class="manage-list" id="manage-list"></div>
      <div class="manage-footer">
        <button id="btn-add-separator" class="manage-add-sep-btn">+ Add Separator</button>
        <button id="btn-reset-sites" class="manage-reset-btn">Reset to default sites</button>
      </div>
    </div>
  </main>

  <!-- Context menu for right-clicking a site icon -->
  <div id="site-ctx-menu" class="site-ctx-menu" role="menu">
    <button id="ctx-new-tab">Open in new tab</button>
    <div class="ctx-sep"></div>
    <button id="ctx-remove" class="ctx-danger">Remove from Sidebar</button>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
